{% extends "base.html" %}
{% block title %}Sign in{% endblock %}
{% block body %}
<div class="min-h-screen flex items-center justify-center p-6">
  <div class="w-full max-w-md bg-white rounded-2xl shadow-sm border border-slate-200 p-8">
    <div class="mb-6">
      <h1 class="text-2xl font-semibold text-slate-900">Sync Dashboard</h1>
      <p class="text-sm text-slate-500 mt-1">Sign in to continue</p>
    </div>
    {% if error %}
    <div class="mb-4 p-3 rounded-lg bg-rose-50 border border-rose-200 text-rose-700 text-sm">{{ error }}</div>
    {% endif %}
    <form method="post" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
        <input type="password" name="password" autofocus required
               class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-slate-400 focus:border-transparent outline-none">
      </div>
      <button type="submit"
              class="w-full bg-slate-900 text-white py-2.5 rounded-lg font-medium hover:bg-slate-800 transition">
        Sign in
      </button>
    </form>
    <div class="mt-6 pt-4 border-t border-slate-100 text-xs text-slate-400 text-center">
      Designed and developed by <span class="font-medium text-slate-500">Eng. Ahmed Morsy</span>
    </div>
  </div>
</div>
{% endblock %}
